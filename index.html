<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Jared Butler | CS & Cybersecurity Student — Portfolio showcasing projects, skills, and experience.">
    <title>Jared Butler | Tech Portfolio</title>
    <link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin>
    <link rel="stylesheet" href="main.css">
</head>
<body>
    <!-- Taskbar -->
    <div class="taskbar">
        <button onclick="openPopup('about')">About Me</button>
        <button onclick="openPopup('skills')">Skills</button>
        <button onclick="openPopup('projects')">Projects</button>
        <div id="google_translate_element"></div>
    </div>

    <!-- Main Content -->
    <div class="matrix-terminal" id="terminal">
        <img id="terminal-photo" src="my_photo.jpg" alt="Jared Butler" loading="lazy" decoding="async" />
        <div id="terminal-text"></div>
    </div>

    <!-- Explore hint -->
    <div class="explore-hint" id="explore-hint">↑ Click the buttons above to explore</div>

    <!-- Popup Windows Container -->
    <div id="popup-container"></div>

    <script defer src="main.js"></script>
    <script async src="//translate.google.com/translate_a/element.js?cb=googleTranslateElementInit"></script>
</body>
</html>
